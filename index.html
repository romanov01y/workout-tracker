<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Трекер тренировок</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:     #141414;
    --bg-card:     #1E1E1E;
    --bg-card2:    #252525;
    --bg-input:    #2A2A2A;
    --bg-bot-msg:  #252525;
    --text-main:   #F0F0F0;
    --text-muted:  #9A9A9A;
    --text-hint:   #5A5A5A;
    --border:      rgba(255,255,255,0.07);
    --border-md:   rgba(255,255,255,0.12);
    --accent:      #A8E63D;
    --accent-dim:  rgba(168,230,61,0.12);
    --accent-dark: #1A2610;
    --radius-sm:   8px;
    --radius-md:   12px;
    --radius-lg:   18px;
    --font: -apple-system, 'Segoe UI', sans-serif;
  }

  body {
    background: var(--bg-page);
    font-family: var(--font);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 74px;
  }

  /* ── SCREEN ── */
  #app-screen {
    flex: 1;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── WELCOME ── */
  .welcome-block {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 36px 24px 32px;
    text-align: center;
  }
  .welcome-logo {
    width: 52px; height: 52px;
    background: var(--accent-dim);
    border-radius: 14px;
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-logo svg { width: 28px; height: 28px; }
  .welcome-block h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .welcome-block p {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .bounce-arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent-dim);
    animation: bounce 1.5s ease-in-out infinite;
  }
  .bounce-arrow svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2.2; stroke-linecap: round; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(7px); }
  }

  /* ── PANEL ── */
  .panel {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 18px 14px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: -0.2px;
    border-bottom: 0.5px solid var(--border);
  }
  .panel-body { padding: 16px 18px; }

  /* ── PROGRAM BUTTONS ── */
  .prog-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .prog-btn {
    background: var(--bg-input);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    padding: 16px 10px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
  }
  .prog-btn span { display: block; font-size: 11px; font-weight: 400; color: var(--text-hint); margin-top: 4px; }
  .prog-btn:active { opacity: 0.75; }
  .prog-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .prog-btn.active span { color: rgba(168,230,61,0.6); }

  /* ── DAYS GRID ── */
  .days-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .day-col {
    background: var(--bg-card2);
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    padding: 12px 11px;
  }
  .day-col h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .day-col ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .day-col li {
    font-size: 12px;
    color: var(--text-main);
    line-height: 1.35;
    padding-left: 11px;
    position: relative;
  }
  .day-col li::before {
    content: '';
    position: absolute;
    left: 0; top: 5px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
  }
  .day-col .ex-sets {
    display: block;
    font-size: 10px;
    color: var(--text-hint);
    margin-top: 1px;
  }

  /* ── COMING SOON ── */
  .coming-soon {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 48px 20px;
    text-align: center;
  }
  .coming-soon p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  /* ── CHAT ── */
  .chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 156px); }
  .chat-date-badge {
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 13px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-bot {
    background: var(--bg-bot-msg);
    color: var(--text-main);
    align-self: flex-start;
    border-radius: 4px var(--radius-md) var(--radius-md) var(--radius-md);
    border: 0.5px solid var(--border);
  }
  .msg-user {
    background: var(--accent);
    color: #111;
    font-weight: 500;
    align-self: flex-end;
    border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
  }
  .chat-input-row {
    display: flex;
    gap: 8px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }
  .chat-input-row input {
    flex: 1;
    background: var(--bg-input);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s;
  }
  .chat-input-row input::placeholder { color: var(--text-hint); }
  .chat-input-row input:focus { border-color: var(--accent); }
  .send-btn {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius-md);
    padding: 0 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .send-btn:active { opacity: 0.8; }

  /* ── RESULTS ── */
  .results-days-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .result-day-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
  }
  .result-entry {
    background: var(--bg-card2);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    padding: 10px 11px;
    margin-bottom: 7px;
  }
  .result-entry:last-child { margin-bottom: 0; }
  .result-entry .ex-name { font-size: 12px; font-weight: 500; color: var(--text-main); margin-bottom: 3px; }
  .result-entry .ex-detail { font-size: 11px; color: var(--text-muted); }
  .results-empty { text-align: center; color: var(--text-hint); font-size: 14px; padding: 40px 0; line-height: 1.7; }

  /* ── BOTTOM NAV ── */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg-card);
    border-top: 0.5px solid var(--border-md);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav button {
    background: none;
    border: none;
    padding: 11px 4px 13px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-hint);
    transition: color 0.15s;
    line-height: 1.2;
  }
  nav button svg {
    width: 22px; height: 22px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  nav button.active { color: var(--accent); }
  nav button.active .nav-dot {
    display: block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 auto -4px;
  }
  .nav-dot { display: none; }

  /* scrollbar */
  .chat-messages::-webkit-scrollbar { width: 2px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }
</style>
</head>
<body>

<div id="app-screen"></div>

<nav>
  <button id="nav-program" onclick="showTab('program')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Программа
    <span class="nav-dot"></span>
  </button>
  <button id="nav-tracker" onclick="showTab('tracker')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
    Трекер
    <span class="nav-dot"></span>
  </button>
  <button id="nav-results" onclick="showTab('results')">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Мои результаты
    <span class="nav-dot"></span>
  </button>
</nav>

<script>
const PROGRAM_FULLBODY = {
  day1: [
    { name: 'Приседания со штангой', sets: '2×10' },
    { name: 'Жим штанги лёжа',       sets: '2×10' },
    { name: 'Румынская тяга',         sets: '2×10' },
    { name: 'Тяга верт. блока',       sets: '3×12' },
    { name: 'Жим гантелей на плечи',  sets: '2×10' },
    { name: 'Разгибание ног',         sets: '2×12' },
    { name: 'Сведения рук (бабочка)', sets: '2×12' },
    { name: 'Сгибание на бицепс',     sets: '2×10' },
    { name: 'Французский жим',        sets: '2×10' },
    { name: 'Пресс',                  sets: '—' },
  ],
  day2: [
    { name: 'Болгарские приседания',  sets: '2×10' },
    { name: 'Жим ногами / Гакк',      sets: '2×10' },
    { name: 'Жим гантелей наклон',    sets: '3×10' },
    { name: 'Тяга в наклоне',         sets: '2×10' },
    { name: 'Тяга гориз. блока',      sets: '3×10' },
    { name: 'Разводка (средн. дельта)', sets: '2×10' },
    { name: 'Разведения задн. дельта', sets: '2×10' },
    { name: 'Обратные сгибания',      sets: '—' },
    { name: 'Разгибания трицепс',     sets: '—' },
    { name: 'Подъёмы на икры',        sets: '—' },
    { name: 'Пресс',                  sets: '—' },
  ]
};

let currentTab = 'home';
let selectedProgram = null;
let chatState = 'ask_exercise';
let currentExercise = '';
let pendingWeight = '';
let chatLog = [];

function getTodayStr() {
  return new Date().toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function saveEntry(exercise, weight, sets, reps) {
  const log = JSON.parse(localStorage.getItem('workout_log') || '[]');
  log.push({ date: getTodayStr(), exercise, weight, sets, reps, ts: Date.now() });
  localStorage.setItem('workout_log', JSON.stringify(log));
}

function getLog() { return JSON.parse(localStorage.getItem('workout_log') || '[]'); }

function getLastTwoDays() {
  const log = getLog();
  if (!log.length) return [];
  const dates = [...new Set(log.map(e => e.date))].sort((a, b) => {
    const pa = a.split('.').reverse().join('-');
    const pb = b.split('.').reverse().join('-');
    return pb.localeCompare(pa);
  });
  return dates.slice(0, 2);
}

const screen = document.getElementById('app-screen');

function showTab(tab) {
  currentTab = tab;
  ['program','tracker','results'].forEach(t => {
    const btn = document.getElementById('nav-'+t);
    btn.classList.toggle('active', t === tab);
  });
  render();
}

function render() {
  if (currentTab === 'home') renderHome();
  else if (currentTab === 'program') renderProgram();
  else if (currentTab === 'tracker') renderTracker();
  else if (currentTab === 'results') renderResults();
}

function renderHome() {
  screen.innerHTML = `
    <div class="welcome-block">
      <div class="welcome-logo">
        <svg viewBox="0 0 28 28" fill="none" stroke="${'#A8E63D'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 14c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10"/>
          <path d="M8 18l4-4 3 3 5-6"/>
        </svg>
      </div>
      <h1>Добро пожаловать!</h1>
      <p>Выберите раздел ниже,<br>чтобы начать тренировку</p>
      <div class="bounce-arrow">
        <svg viewBox="0 0 18 18"><polyline points="4 7 9 12 14 7"/></svg>
      </div>
    </div>
  `;
}

function renderProgram() {
  let html = `
    <div class="panel">
      <div class="panel-header">Программа тренировок</div>
      <div class="panel-body">
        <div class="prog-buttons">
          <div class="prog-btn ${selectedProgram==='fullbody'?'active':''}" onclick="selectProgram('fullbody')">
            Фулл-боди<span>2 дня в неделю</span>
          </div>
          <div class="prog-btn ${selectedProgram==='split'?'active':''}" onclick="selectProgram('split')">
            Сплит<span>3 дня в неделю</span>
          </div>
        </div>
      </div>
    </div>`;

  if (selectedProgram === 'fullbody') {
    const makeList = arr => arr.map(e =>
      `<li>${escHtml(e.name)}<span class="ex-sets">${e.sets}</span></li>`
    ).join('');
    html += `
      <div class="panel">
        <div class="panel-header">Фулл-боди — расписание</div>
        <div class="panel-body" style="padding-top:8px">
          <div class="days-grid">
            <div class="day-col"><h3>День 1</h3><ul>${makeList(PROGRAM_FULLBODY.day1)}</ul></div>
            <div class="day-col"><h3>День 2</h3><ul>${makeList(PROGRAM_FULLBODY.day2)}</ul></div>
          </div>
        </div>
      </div>`;
  }

  if (selectedProgram === 'split') {
    html += `<div class="coming-soon"><p>Здесь пока ничего нет.<br>Возможно, добавлю этот раздел позже.</p></div>`;
  }

  screen.innerHTML = html;
}

function selectProgram(p) { selectedProgram = p; renderProgram(); }

function renderTracker() {
  const msgs = chatLog.map(m =>
    `<div class="msg msg-${m.from}">${escHtml(m.text)}</div>`
  ).join('');

  screen.innerHTML = `
    <div class="panel" style="flex:1;display:flex;flex-direction:column;">
      <div class="panel-header">Трекер тренировки</div>
      <div class="panel-body" style="flex:1;display:flex;flex-direction:column;padding:12px 14px;">
        <div class="chat-date-badge">${getTodayStr()}</div>
        <div class="chat-messages" id="chat-messages">${msgs}</div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="Введите сообщение…" onkeydown="if(event.key==='Enter')sendChat()">
          <button class="send-btn" onclick="sendChat()">Отправить</button>
        </div>
      </div>
    </div>`;

  scrollChat();
  if (chatLog.length === 0) addBotMessage('Привет! 💪\nВведите название упражнения, которое вы выполняете сегодня.');
}

function scrollChat() {
  const el = document.getElementById('chat-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

function addBotMessage(text) {
  chatLog.push({ from: 'bot', text });
  const el = document.getElementById('chat-messages');
  if (el) {
    const div = document.createElement('div');
    div.className = 'msg msg-bot';
    div.textContent = text;
    el.appendChild(div);
    scrollChat();
  }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  chatLog.push({ from: 'user', text: val });
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.textContent = val;
  el.appendChild(div);
  scrollChat();
  setTimeout(() => handleBot(val), 300);
}

function handleBot(input) {
  if (chatState === 'ask_exercise') {
    currentExercise = input;
    chatState = 'ask_weight';
    addBotMessage(`Упражнение: ${currentExercise}\n\nВведите рабочий вес (кг):`);
  } else if (chatState === 'ask_weight') {
    pendingWeight = input;
    chatState = 'ask_sets';
    addBotMessage('Введите подходы × повторения\n(например: 3×10):');
  } else if (chatState === 'ask_sets') {
    let sets = '?', reps = '?';
    const m = input.match(/(\d+)[×xXхХ](\d+)/);
    if (m) { sets = m[1]; reps = m[2]; }
    saveEntry(currentExercise, pendingWeight, sets, reps);
    addBotMessage(`✓ Записано!\n${getTodayStr()} — ${currentExercise}: ${pendingWeight}кг × ${reps} × ${sets} подх.\n\nВведите следующее упражнение или напишите «готово».`);
    chatState = 'ask_exercise';
    currentExercise = '';
    pendingWeight = '';
  }
}

function renderResults() {
  const days = getLastTwoDays();
  if (!days.length) {
    screen.innerHTML = `<div class="coming-soon"><p>Записей пока нет.<br>Начните тренировку в разделе «Трекер».</p></div>`;
    return;
  }
  const log = getLog();
  const cols = days.map(date => {
    const entries = log.filter(e => e.date === date);
    const rows = entries.map(e => `
      <div class="result-entry">
        <div class="ex-name">${escHtml(e.exercise)}</div>
        <div class="ex-detail">${escHtml(e.weight)} кг × ${escHtml(e.reps)} повт. × ${escHtml(e.sets)} подх.</div>
      </div>`).join('');
    return `<div><div class="result-day-label">${date}</div>${rows}</div>`;
  }).join('');

  screen.innerHTML = `
    <div class="panel">
      <div class="panel-header">Последние тренировки</div>
      <div class="panel-body">
        <div class="results-days-grid">${cols}</div>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
renderHome();
['program','tracker','results'].forEach(t => document.getElementById('nav-'+t).classList.remove('active'));

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
